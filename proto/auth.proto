syntax = "proto3";

package apex;

option go_package = "apex/teamserver/pkg/proto/apexpb";

import "common.proto";

// ─── Authentication & Operator Management ────────────────────

service AuthService {
  rpc Login             (LoginRequest)             returns (LoginResponse);
  rpc Logout            (LogoutRequest)            returns (Empty);
  rpc RefreshToken      (RefreshTokenRequest)      returns (RefreshTokenResponse);
  rpc GetCurrentOperator(Empty)                    returns (Operator);
  rpc CreateOperator    (CreateOperatorRequest)    returns (Operator);
  rpc ListOperators     (Empty)                    returns (ListOperatorsResponse);
  rpc DeleteOperator    (DeleteOperatorRequest)    returns (Empty);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string   access_token  = 1;
  string   refresh_token = 2;
  Operator operator      = 3;
}

message LogoutRequest {
  string access_token = 1;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token  = 1;
  string refresh_token = 2;
}

message CreateOperatorRequest {
  string       username = 1;
  string       password = 2;
  OperatorRole role     = 3;
}

message DeleteOperatorRequest {
  string id = 1;
}

message ListOperatorsResponse {
  repeated Operator operators = 1;
}
