server:
  grpc_addr: "0.0.0.0:50051"
  http_addr: "0.0.0.0:8443"
  tls:
    enabled: true
    cert_file: ""       # leave empty to auto-generate self-signed
    key_file: ""        # leave empty to auto-generate self-signed
    ca_file: ""         # set to CA cert path when using mutual_tls
    mutual_tls: false   # require client certificates (issue #78)

database:
  postgres:
    host: "localhost"
    port: 5432
    user: "apex"
    password: "apex_secret"
    dbname: "apex"
    sslmode: "disable"
  redis:
    addr: "localhost:6379"
    password: ""
    db: 0

auth:
  jwt_secret: "change-me-in-production-use-a-real-secret"
  token_expiry: "24h"

logging:
  level: "debug"
  pretty: true
